version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cicd_postgres
    environment:
      POSTGRES_USER: cicd_user
      POSTGRES_PASSWORD: cicd_pass
      POSTGRES_DB: cicd_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    container_name: cicd_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
