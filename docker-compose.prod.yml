version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cicd_postgres_prod
    environment:
      POSTGRES_USER: cicd_user
      POSTGRES_PASSWORD: cicd_pass
      POSTGRES_DB: cicd_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cicd_redis_prod
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: cicd_server_prod
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://cicd_user:cicd_pass@postgres:5432/cicd_db
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: cicd_worker_prod
    depends_on:
      - postgres
      - redis
      - server
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://cicd_user:cicd_pass@postgres:5432/cicd_db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cicd_frontend_prod
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
